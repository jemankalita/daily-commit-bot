name: Smart Realistic Commits

on:
  schedule:
    - cron: "0 14,18,21 * * *"   # evening/night (more human-like)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate realistic commits
        run: |
          git config user.name "jemankalita"
          git config user.email "jemankalita1@gmail.com"

          # 30% chance to skip the day (realistic inactivity)
          SKIP=$(( RANDOM % 10 ))
          if [ "$SKIP" -lt 3 ]; then
            echo "Skipping today (rest day)"
            exit 0
          fi

          # Random number of commits (1–6)
          COUNT=$(( (RANDOM % 6) + 1 ))

          # Realistic commit messages
          MESSAGES=(
            "fix bug"
            "update logic"
            "refactor code"
            "improve performance"
            "minor changes"
            "cleanup"
            "add feature"
            "optimize code"
            "update README"
            "debug issue"
          )

          echo "Making $COUNT commits..."

          for i in $(seq 1 $COUNT)
          do
            MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

            echo "$MSG at $(date)" >> log.txt
            git add .

            # Random delay (simulate real coding)
            sleep $(( (RANDOM % 5) + 1 ))

            git commit -m "$MSG"
          done

          git push
